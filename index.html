<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HANA Blood Donation 2026</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #dc2626;
            --blue: #2563eb;
            --green: #16a34a;
            --gray: #64748b;
            --bg: #f8fafc;
            --white: #ffffff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            font-family: 'Sarabun', sans-serif;
            background: #f1f5f9;
            color: #1e293b;
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            background: var(--white);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        /* --- Views Management --- */
        .view { display: none; padding-bottom: 2rem; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- Components --- */
        .header {
            background: var(--primary);
            color: white;
            padding: 1.2rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            position: sticky;
            top: 0;
            z-index: 50;
            border-radius: 0 0 1.5rem 1.5rem;
            transition: background 0.3s;
        }

        .back-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 8px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
        }

        /* --- Home View Styles --- */
        .hero {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            padding: 4rem 2rem 5rem;
            text-align: center;
            color: white;
            border-radius: 0 0 3.5rem 3.5rem;
            box-shadow: 0 10px 15px -3px rgba(220, 38, 38, 0.3);
        }

        .hero-icon {
            background: rgba(255,255,255,0.2);
            width: 85px;
            height: 85px;
            border-radius: 2.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            backdrop-filter: blur(10px);
        }

        .menu-grid {
            padding: 0 1.5rem;
            margin-top: -3rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .menu-item {
            background: white;
            padding: 1.2rem;
            border-radius: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 1.2rem;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            border: 1px solid #f1f5f9;
            transition: transform 0.1s;
        }
        .menu-item:active { transform: scale(0.98); }

        /* --- Form Styles --- */
        .form-content { padding: 1.5rem; display: flex; flex-direction: column; gap: 1.2rem; }
        .label-tag { font-size: 0.8rem; font-weight: bold; color: var(--gray); margin-bottom: 0.4rem; display: block; padding-left: 0.2rem; }
        
        .input-field {
            width: 100%;
            padding: 0.9rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 1rem;
            background: white;
            outline: none;
            transition: 0.2s;
            font-size: 1rem;
            font-family: inherit;
        }
        .input-field:focus { border-color: var(--primary); }
        .input-readonly { background: #f8fafc; cursor: default; }

        .btn-submit {
            width: 100%;
            padding: 1.1rem;
            border-radius: 1.2rem;
            border: none;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            background: var(--primary);
            box-shadow: 0 4px 6px rgba(220, 38, 38, 0.2);
        }
        .btn-submit:disabled { background: #e2e8f0 !important; color: #94a3b8; cursor: not-allowed; box-shadow: none; }

        /* Selection Grids */
        .selection-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.6rem; }
        .chip {
            padding: 0.8rem;
            text-align: center;
            border-radius: 1rem;
            border: 2px solid #e2e8f0;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            background: white;
        }
        .chip.selected { background: var(--primary); color: white; border-color: var(--primary); }

        .day-card {
            padding: 1.2rem;
            border: 2.5px solid #e2e8f0;
            border-radius: 1.2rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
            background: white;
        }

        .slot-item {
            padding: 1rem;
            border: 1.5px solid #f1f5f9;
            border-radius: 1rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
        }
        .slot-item.full { opacity: 0.5; cursor: not-allowed; background: #f1f5f9; }
        .slot-item.selected { color: white; border-color: transparent; }

        /* Utils */
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        #loading-overlay { position: absolute; right: 15px; top: 12px; color: var(--primary); display: none; }
    </style>
</head>
<body>

<div class="app-container">
    
    <!-- View: Home -->
    <div id="view-home" class="view active">
        <div class="hero">
            <div class="hero-icon"><i data-lucide="heart" size="45" fill="white"></i></div>
            <h1 style="margin:0; font-size: 1.7rem; font-weight: 800;">ลงทะเบียนบริจาคโลหิต</h1>
            <p style="margin: 0.5rem 0 0; opacity: 0.8;">HANA WELFARE 2026</p>
        </div>
        <div class="menu-grid">
            <div class="menu-item" onclick="navigate('register')">
                <div style="background:#fee2e2; padding:1rem; border-radius:1.2rem; color:#dc2626;"><i data-lucide="heart"></i></div>
                <div><strong style="display:block; font-size:1.1rem;">ลงทะเบียนจองคิว</strong><small style="color:var(--gray)">กรอกรหัสพนักงานและเลือกเวลา</small></div>
            </div>
            <div class="menu-item" onclick="navigate('status')">
                <div style="background:#dbeafe; padding:1rem; border-radius:1.2rem; color:#2563eb;"><i data-lucide="search"></i></div>
                <div><strong style="display:block; font-size:1.1rem;">เช็คสถานะการจอง</strong><small style="color:var(--gray)">ตรวจสอบข้อมูลที่คุณลงไว้</small></div>
            </div>
            <div class="menu-item" onclick="navigate('slots')">
                <div style="background:#dcfce7; padding:1rem; border-radius:1.2rem; color:#16a34a;"><i data-lucide="users"></i></div>
                <div><strong style="display:block; font-size:1.1rem;">ดูจำนวนรอบที่ว่าง</strong><small style="color:var(--gray)">เช็คโควตาแบบ Real-time</small></div>
            </div>
        </div>
    </div>

    <!-- View: Register -->
    <div id="view-register" class="view">
        <div class="header" id="reg-header">
            <button class="back-btn" onclick="navigate('home')"><i data-lucide="chevron-left" size="20"></i></button>
            <h1 style="margin:0; font-size: 1.1rem; font-weight: bold;">ลงทะเบียนจองคิว</h1>
        </div>
        <form class="form-content" id="regForm">
            <div>
                <label class="label-tag">รหัสพนักงาน (6 หลัก)</label>
                <div style="position:relative;">
                    <input class="input-field" type="text" id="empId" maxlength="6" placeholder="เช่น 012345" required>
                    <div id="loading-overlay" class="spinner"><i data-lucide="loader-2" size="20"></i></div>
                </div>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
                <div><label class="label-tag">ชื่อ</label><input class="input-field input-readonly" id="firstName" readonly placeholder="..."></div>
                <div><label class="label-tag">นามสกุล</label><input class="input-field input-readonly" id="lastName" readonly placeholder="..."></div>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:1rem;">
                <div><label class="label-tag">แผนก</label><input class="input-field input-readonly" id="dept" readonly></div>
                <div><label class="label-tag">เบอร์โทร</label><input class="input-field" type="tel" id="phone" required placeholder="0XX-XXXX"></div>
            </div>

            <div>
                <label class="label-tag">กรุ๊ปเลือด</label>
                <div class="selection-grid" id="blood-grid"></div>
            </div>

            <div>
                <label class="label-tag">เลือกวันที่ (แยกตามทีม)</label>
                <div id="day-list" style="display:flex; flex-direction:column; gap:0.8rem;"></div>
            </div>

            <div id="slot-section" style="display:none;">
                <label class="label-tag">เลือกรอบเวลา</label>
                <div id="slot-list" style="display:flex; flex-direction:column; gap:0.6rem;"></div>
            </div>

            <button type="submit" class="btn-submit" id="btnSubmit" disabled>ยืนยันลงทะเบียน</button>
        </form>
    </div>

    <!-- View: Status Check -->
    <div id="view-status" class="view">
        <div class="header" style="background: var(--blue);">
            <button class="back-btn" onclick="navigate('home')"><i data-lucide="chevron-left" size="20"></i></button>
            <h1 style="margin:0; font-size: 1.1rem; font-weight: bold;">เช็คสถานะการจอง</h1>
        </div>
        <div class="form-content">
            <div style="display:flex; gap:0.8rem;">
                <!-- เพิ่ม onkeypress เพื่อรองรับ Enter -->
                <input class="input-field" id="searchEmpId" placeholder="กรอกรหัสพนักงาน 6 หลัก" onkeypress="if(event.key === 'Enter') handleSearch()">
                <button onclick="handleSearch()" style="background:var(--blue); color:white; border:none; border-radius:1rem; padding:0 1.2rem; cursor:pointer;"><i data-lucide="search" size="20"></i></button>
            </div>
            <div id="search-result"></div>
        </div>
    </div>

    <!-- View: Real-time Slots -->
    <div id="view-slots" class="view">
        <div class="header" style="background: var(--green);">
            <button class="back-btn" onclick="navigate('home')"><i data-lucide="chevron-left" size="20"></i></button>
            <h1 style="margin:0; font-size: 1.1rem; font-weight: bold;">สถานะที่ว่าง (Real-time)</h1>
        </div>
        <div class="form-content" id="realtime-slot-container"></div>
    </div>

    <!-- View: Success -->
    <div id="view-success" class="view">
        <div style="text-align:center; padding: 6rem 2rem;">
            <div style="background:#f0fdf4; width:110px; height:110px; border-radius:3.5rem; display:flex; align-items:center; justify-content:center; margin: 0 auto 2rem;">
                <i data-lucide="check-circle" size="64" color="#16a34a"></i>
            </div>
            <h2 style="font-size:1.7rem; font-weight: 800; margin-bottom:0.5rem;">ลงทะเบียนสำเร็จ!</h2>
            <p style="color:var(--gray); margin-bottom:3.5rem;">ระบบได้บันทึกข้อมูลของคุณเรียบร้อยแล้ว</p>
            <button class="btn-submit" onclick="location.reload()">กลับสู่หน้าหลัก</button>
        </div>
    </div>

</div>

<script>
    // --- Config ---
    const API_URL = "https://script.google.com/macros/s/AKfycbwTOQOH5LJHPTT6obxbWGe_TWytmy37W5_da_0oDmEVkmz84sfgYmGPGMd8CzvohH1D/exec";
    const SCHEDULE = [
        { day: 1, date: '23 Apr 2026', team: 'Team B', color: '#dc2626' },
        { day: 2, date: '7 May 2026', team: 'Team A', color: '#2563eb' }
    ];
    const TIME_SLOTS = [
        { id: 1, time: '09:00 - 09:20', limit: 20 },
        { id: 2, time: '09:20 - 09:40', limit: 20 },
        { id: 3, time: '09:40 - 10:00', limit: 20 },
        { id: 4, time: '10:00 - 10:20', limit: 15 },
        { id: 5, time: '10:20 - 10:40', limit: 15 },
        { id: 6, time: '10:40 - 11:00', limit: 15 },
        { id: 7, time: '11:00 - 11:20', limit: 8 },
        { id: 8, time: '11:20 - 11:40', limit: 2 },
    ];
    const BLOOD_GROUPS = ['A', 'B', 'O', 'AB', 'ไม่ทราบ'];

    // --- State Management ---
    let state = {
        registrations: [],
        selectedBlood: '',
        selectedDay: null,
        selectedSlot: null
    };

    // --- Core Functions ---
    async function fetchData() {
        try {
            const res = await fetch(`${API_URL}?action=getRegistrations`);
            const data = await res.json();
            if(Array.isArray(data)) {
                state.registrations = data;
                renderRealtimeSlots();
                if(state.selectedDay) renderTimeSlots();
            }
        } catch(e) { console.error("Error fetching", e); }
    }

    function navigate(viewName) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(`view-${viewName}`).classList.add('active');
        window.scrollTo(0,0);
        if(viewName === 'slots') renderRealtimeSlots();
        // Clear search if navigate to status
        if(viewName === 'status') {
            document.getElementById('searchEmpId').value = '';
            document.getElementById('search-result').innerHTML = '';
        }
    }

    const formatId = (id) => String(id || '').padStart(6, '0');

    // --- UI Renderers ---
    function initApp() {
        lucide.createIcons();
        
        // Render Blood Chips
        const bloodGrid = document.getElementById('blood-grid');
        BLOOD_GROUPS.forEach(bg => {
            const chip = document.createElement('div');
            chip.className = 'chip';
            chip.innerText = bg;
            chip.onclick = () => {
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
                chip.classList.add('selected');
                state.selectedBlood = bg;
                validateForm();
            };
            bloodGrid.appendChild(chip);
        });

        // Render Day Cards
        const dayList = document.getElementById('day-list');
        SCHEDULE.forEach(day => {
            const card = document.createElement('div');
            card.className = 'day-card';
            card.innerHTML = `
                <div style="display:flex; align-items:center; gap:0.8rem;">
                    <div style="background:${day.color}; color:white; padding:8px; border-radius:10px;"><i data-lucide="calendar" size="18"></i></div>
                    <div>
                        <div style="font-weight:bold; color:${day.color}">${day.date}</div>
                        <div style="font-size:0.8rem; color:var(--gray)">${day.team}</div>
                    </div>
                </div>
                <div class="check-mark" style="display:none;"><i data-lucide="check-circle" color="${day.color}"></i></div>
            `;
            card.onclick = () => {
                document.querySelectorAll('.day-card').forEach(c => {
                    c.style.borderColor = '#e2e8f0';
                    c.style.background = 'white';
                    c.querySelector('.check-mark').style.display = 'none';
                });
                card.style.borderColor = day.color;
                card.style.background = `${day.color}10`;
                card.querySelector('.check-mark').style.display = 'block';
                
                state.selectedDay = day;
                state.selectedSlot = null;
                document.getElementById('reg-header').style.background = day.color;
                renderTimeSlots();
                validateForm();
                lucide.createIcons();
            };
            dayList.appendChild(card);
        });
        lucide.createIcons();
        fetchData();
        setInterval(fetchData, 20000);
    }

    function renderTimeSlots() {
        const container = document.getElementById('slot-list');
        document.getElementById('slot-section').style.display = 'block';
        container.innerHTML = '';
        
        const day = state.selectedDay;
        TIME_SLOTS.forEach(slot => {
            const bookedCount = state.registrations.filter(r => r.date === day.date && r.time === slot.time).length;
            const remaining = slot.limit - bookedCount;
            const isFull = remaining <= 0;

            const div = document.createElement('div');
            div.className = `slot-item ${isFull ? 'full' : ''}`;
            div.innerHTML = `
                <div style="display:flex; align-items:center; gap:0.6rem;"><i data-lucide="clock" size="16"></i><strong>${slot.time}</strong></div>
                <span style="font-size:0.8rem; font-weight:bold;">${isFull ? 'เต็มแล้ว' : 'ว่าง '+remaining+' ที่'}</span>
            `;

            if(!isFull) {
                div.onclick = () => {
                    document.querySelectorAll('.slot-item').forEach(s => {
                        s.classList.remove('selected');
                        s.style.background = 'white';
                        s.style.color = 'inherit';
                    });
                    div.classList.add('selected');
                    div.style.background = day.color;
                    div.style.color = 'white';
                    state.selectedSlot = slot;
                    validateForm();
                };
            }
            container.appendChild(div);
        });
        lucide.createIcons();
    }

    function renderRealtimeSlots() {
        const container = document.getElementById('realtime-slot-container');
        container.innerHTML = '';
        SCHEDULE.forEach(day => {
            let html = `
                <div style="border:1px solid #f1f5f9; border-radius:1.5rem; background:white; overflow:hidden; margin-bottom:1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                    <div style="background:${day.color}; padding:1rem 1.5rem; display:flex; justify-content:space-between; color:white; align-items:center;">
                        <strong>${day.date}</strong><span style="background:rgba(255,255,255,0.2); padding:4px 12px; border-radius:20px; fontSize:0.8rem;">${day.team}</span>
                    </div>
                    <div style="padding:0.8rem 1.2rem;">
            `;
            TIME_SLOTS.forEach(slot => {
                const count = state.registrations.filter(r => r.date === day.date && r.time === slot.time).length;
                const remains = slot.limit - count;
                html += `
                    <div style="display:flex; justify-content:space-between; padding:0.8rem 0; border-bottom:1px solid #f8fafc">
                        <span>${slot.time}</span>
                        <span style="font-weight:bold; color:${remains <= 0 ? '#dc2626' : '#16a34a'}">${remains <= 0 ? 'เต็ม' : 'ว่าง '+remains}</span>
                    </div>
                `;
            });
            html += `</div></div>`;
            container.innerHTML += html;
        });
    }

    // --- Interaction Logic ---
    document.getElementById('empId').oninput = async (e) => {
        const val = e.target.value;
        if(val.length === 6) {
            document.getElementById('loading-overlay').style.display = 'block';
            try {
                const res = await fetch(`${API_URL}?action=getEmployee&empId=${formatId(val)}`);
                const emp = await res.json();
                if(emp.firstName) {
                    document.getElementById('firstName').value = emp.firstName;
                    document.getElementById('lastName').value = emp.lastName;
                    document.getElementById('dept').value = emp.department;
                } else {
                    alert("ไม่พบข้อมูลพนักงาน");
                    document.getElementById('firstName').value = '';
                }
            } catch(e) {}
            document.getElementById('loading-overlay').style.display = 'none';
        } else {
            document.getElementById('firstName').value = '';
            document.getElementById('lastName').value = '';
            document.getElementById('dept').value = '';
        }
        validateForm();
    };

    function validateForm() {
        const isReady = document.getElementById('firstName').value && 
                        state.selectedBlood && 
                        state.selectedDay && 
                        state.selectedSlot;
        document.getElementById('btnSubmit').disabled = !isReady;
    }

    document.getElementById('regForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnSubmit');
        if(btn.disabled) return; // ป้องกันการกด Enter ซ้ำขณะข้อมูลไม่ครบ

        btn.disabled = true;
        btn.innerText = "กำลังบันทึก...";

        const payload = {
            action: 'register',
            empId: formatId(document.getElementById('empId').value),
            name: `${document.getElementById('firstName').value} ${document.getElementById('lastName').value}`,
            dept: document.getElementById('dept').value,
            blood: state.selectedBlood,
            phone: document.getElementById('phone').value,
            date: state.selectedDay.date,
            time: state.selectedSlot.time
        };

        try {
            await fetch(API_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            });
            setTimeout(() => navigate('success'), 1500);
        } catch(e) {
            alert("เกิดข้อผิดพลาด");
            btn.disabled = false;
            btn.innerText = "ยืนยันลงทะเบียน";
        }
    };

    function handleSearch() {
        const input = document.getElementById('searchEmpId');
        const id = formatId(input.value);
        if(!input.value) return;

        const map = new Map();
        state.registrations.forEach(r => map.set(formatId(r.empId), r));
        const found = map.get(id);
        const container = document.getElementById('search-result');
        
        if(found) {
            container.innerHTML = `
                <div style="border:2.5px solid var(--blue); border-radius:1.8rem; padding:1.5rem; background:white; margin-top:1.5rem; box-shadow: 0 10px 15px rgba(37,99,235,0.1);">
                    <div style="text-align:center; margin-bottom:1.5rem;">
                        <i data-lucide="check-circle" color="var(--blue)" size="54"></i>
                        <h2 style="margin:0.5rem 0 0; font-size:1.4rem;">ลงทะเบียนแล้ว</h2>
                    </div>
                    <div style="display:flex; flex-direction:column; gap:1rem; border-top:1px dashed #e2e8f0; padding-top:1.5rem;">
                        <div><small style="color:var(--gray); display:block; font-size:0.75rem;">ชื่อ-นามสกุล / รหัส</small><strong>${found.name} (${id})</strong></div>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                            <div><small style="color:var(--gray); display:block; font-size:0.75rem;">กรุ๊ปเลือด</small><strong>${found.blood || '-'}</strong></div>
                            <div><small style="color:var(--gray); display:block; font-size:0.75rem;">แผนก</small><strong>${found.dept}</strong></div>
                        </div>
                        <div style="background:#f8fafc; padding:1.2rem; border-radius:1.2rem; display:flex; justify-content:space-between;">
                            <div><small style="color:var(--gray); font-size:0.75rem;">วันที่นัดหมาย</small><div style="color:var(--blue); font-weight:bold;">${found.date}</div></div>
                            <div style="text-align:right;"><small style="color:var(--gray); font-size:0.75rem;">ช่วงเวลา</small><div style="color:var(--blue); font-weight:bold;">${found.time}</div></div>
                        </div>
                    </div>
                </div>
            `;
        } else {
            container.innerHTML = `<div style="text-align:center; color:var(--gray); padding:3rem;"><i data-lucide="alert-circle" size="40" style="opacity:0.3; margin-bottom:1rem;"></i><br>ไม่พบข้อมูลการจอง</div>`;
        }
        lucide.createIcons();
    }

    window.onload = initApp;
</script>
